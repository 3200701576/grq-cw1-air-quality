openapi: 3.0.3
info:
  title: Air Quality API
  version: 0.1.0
  description: Coursework API for city-level air quality data.
paths:
  /api/analytics/city-trend/:
    get:
      operationId: analytics_city_trend_retrieve
      description: |-
        获取指定城市某污染物的时间趋势数据
        参数: city - 城市名
              pollutant - 污染物类型 (pm25/pm10/no2/co/aqi)
        返回: 按日期排序的污染物数值列表
      tags:
      - analytics
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/records/:
    get:
      operationId: records_list
      tags:
      - records
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AirQualityRecord'
          description: ''
    post:
      operationId: records_create
      tags:
      - records
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AirQualityRecord'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AirQualityRecord'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AirQualityRecord'
        required: true
      security:
      - tokenAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AirQualityRecord'
          description: ''
  /api/records/{id}/:
    get:
      operationId: records_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - records
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AirQualityRecord'
          description: ''
    put:
      operationId: records_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - records
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AirQualityRecord'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AirQualityRecord'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AirQualityRecord'
        required: true
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AirQualityRecord'
          description: ''
    patch:
      operationId: records_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - records
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAirQualityRecord'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAirQualityRecord'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAirQualityRecord'
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AirQualityRecord'
          description: ''
    delete:
      operationId: records_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - records
      security:
      - tokenAuth: []
      - {}
      responses:
        '204':
          description: No response body
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
