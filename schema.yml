      tags:
      - schema
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
components:
  schemas:
    AirQualityRecord:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        city:
          type: string
          maxLength: 100
        date:
          type: string
          format: date
        pm25:
          type: number
          format: double
          nullable: true
        pm10:
          type: number
          format: double
          nullable: true
        no2:
          type: number
          format: double
          nullable: true
        co:
          type: number
          format: double
          nullable: true
        aqi:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - city
      - created_at
      - date
      - id
      - updated_at
    PatchedAirQualityRecord:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        city:
          type: string
          maxLength: 100
        date:
          type: string
          format: date
        pm25:
          type: number
          format: double
          nullable: true
        pm10:
          type: number
          format: double
          nullable: true
        no2:
          type: number
          format: double
          nullable: true
        co:
          type: number
          format: double
          nullable: true
        aqi:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
